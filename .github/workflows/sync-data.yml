name: Sync Data

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run Semantic Sync
        env:
          API_EVENTS_URL: ${{ secrets.API_EVENTS_URL }}
          API_INSTA_URL: ${{ secrets.API_INSTA_URL }}
        run: node scripts/sync.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the changed files
          git add data/events.json data/instagram.json
          if [ -d "images/instagram" ]; then
            git add images/instagram/
          fi
          
          # Commit and push only if there are actual changes staged
          if ! git diff --cached --quiet; then
            git commit -m "chore: automated semantic sync [skip ci]"
            git push
          else
            echo "No semantic changes detected. Skipping commit."
          fi
